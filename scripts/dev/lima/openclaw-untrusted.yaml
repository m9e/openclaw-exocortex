minimumLimaVersion: "2.0.0"

base:
  - template:_images/ubuntu

vmType: vz
arch: aarch64
cpus: 4
memory: "8GiB"
disk: "60GiB"

containerd:
  system: false
  user: false

hostResolver:
  enabled: true

env:
  OPENCLAW_VM_ROLE: untrusted

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y \
        ca-certificates \
        curl \
        dnsutils \
        git \
        iproute2 \
        iptables \
        jq \
        net-tools \
        nftables \
        python3 \
        socat \
        tcpdump

message: |
  openclaw-untrusted is an isolated Lima VM for untrusted content and tool execution.
  No host directories are mounted into this guest.
  Guest localhost ports are not auto-forwarded; only these host forwards are enabled:
    host 127.0.0.1:39789 -> guest 127.0.0.1:18789
    host 127.0.0.1:39790 -> guest 127.0.0.1:18790
  These forwards are host-loopback only.

portForwards:
  - guestPort: 18789
    hostIP: "127.0.0.1"
    hostPort: 39789
  - guestPort: 18790
    hostIP: "127.0.0.1"
    hostPort: 39790
  - guestIP: "127.0.0.1"
    guestPortRange: [1, 65535]
    hostIP: "127.0.0.1"
    hostPortRange: [1, 65535]
    proto: any
    ignore: true
