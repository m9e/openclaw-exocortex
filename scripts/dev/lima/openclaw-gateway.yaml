minimumLimaVersion: "2.0.0"

base:
  - template:_images/ubuntu
  - template:_default/mounts

vmType: vz
arch: aarch64
cpus: 6
memory: "12GiB"
disk: "80GiB"
mountType: virtiofs

containerd:
  system: false
  user: false

hostResolver:
  enabled: true

env:
  OPENCLAW_VM_ROLE: gateway

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y \
        ca-certificates \
        curl \
        dnsutils \
        git \
        iproute2 \
        iptables \
        jq \
        net-tools \
        nftables \
        python3 \
        socat \
        tcpdump

message: |
  openclaw-gateway is a trusted Lima VM for the OpenClaw gateway and trusted tools.
  Guest localhost ports are not auto-forwarded; only these host forwards are enabled:
    host port 29789 -> guest 127.0.0.1:18789
    host port 29790 -> guest 127.0.0.1:18790
  These forwards bind on all host interfaces so other Lima guests can reach them via host.lima.internal.

portForwards:
  - guestPort: 18789
    hostIP: "0.0.0.0"
    hostPort: 29789
  - guestPort: 18790
    hostIP: "0.0.0.0"
    hostPort: 29790
  - guestIP: "127.0.0.1"
    guestPortRange: [1, 65535]
    hostIP: "127.0.0.1"
    hostPortRange: [1, 65535]
    proto: any
    ignore: true
